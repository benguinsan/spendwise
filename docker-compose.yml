version: "3"
services:
  postgres:
    env_file: "./docker-compose-env/database.env"
    image: postgres:16-alpine
    ports:
      - "54321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
  nginx:
    restart: always
    depends_on:
      - backend
      - frontend
    build:
      dockerfile: Dockerfile
      context: ./nginx
    ports:
      - "3000:80"
  backend:
    env_file:
      - path: "./docker-compose-env/database.env"
      - path: "./docker-compose-env/backend.env"
    depends_on:
      - postgres
    build:
      dockerfile: Dockerfile
      context: backend
    volumes:
      - /app/node_modules
      - ./backend:/app
    ports:
      - "5001:5000"
  frontend:
    stdin_open: true
    build:
      dockerfile: Dockerfile
      context: ./frontend
    volumes:
      - /app/node_modules
      - ./frontend:/app

volumes:
  postgres_data:
