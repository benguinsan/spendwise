# Nginx start được ngay cả khi frontend/backend chưa có trong DNS: resolve qua Docker DNS lúc proxy,
# không resolve tên ở bước load config (tránh "host not found in upstream").

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 10m;

    location /api/ {
        set $backend_upstream backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Strip /api prefix before forwarding to Nest routes.
        # Example: /api/users -> /users
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://$backend_upstream;
    }

    location / {
        set $frontend_upstream frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_pass http://$frontend_upstream;
    }
}
